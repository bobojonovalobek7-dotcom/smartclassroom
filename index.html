<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqlli Sinfxona Monitoring Paneli</title>
    
    <!-- 1. Tailwind CSS (Dizayn ishlashi uchun shart) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
      // Tailwind ranglarini sozlash
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              darkBg: '#0f172a',
              neonBlue: '#00d2ff',
              sunYellow: '#fbbf24',
              emeraldAccent: '#10b981',
            },
            fontFamily: { sans: ['Outfit', 'sans-serif'] },
          }
        }
      }
    </script>

    <style type="text/css">
      body { background-color: #0f172a; color: white; }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        transition: all 0.4s ease;
      }
      .glass-card:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.08);
      }
      .progress-ring__circle {
        transition: stroke-dashoffset 0.8s ease-in-out;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }
      @keyframes pulse-neon {
        0%, 100% { opacity: 1; filter: brightness(1.2); }
        50% { opacity: 0.5; filter: brightness(0.8); }
      }
      .animate-pulse-neon { animation: pulse-neon 2s infinite; }
    </style>
  </head>
  <body class="bg-darkBg text-white antialiased">
    <div id="app" class="min-h-screen flex flex-col p-4 md:p-8 max-w-7xl mx-auto">
      
      <!-- Sarlavha (Header) -->
      <header class="flex flex-col md:flex-row justify-between items-center mb-12 glass p-6 rounded-3xl">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
          <div class="w-10 h-10 bg-neonBlue/20 rounded-xl flex items-center justify-center border border-neonBlue/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-neonBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 10V4" />
            </svg>
          </div>
          <h1 class="text-2xl font-semibold tracking-tight text-white/90">Aqlli Sinfxona <span class="text-neonBlue font-light">v1.0</span></h1>
        </div>
        
        <div class="flex items-center gap-3 bg-white/5 px-5 py-2 rounded-full border border-white/10">
          <div class="w-2.5 h-2.5 bg-emeraldAccent rounded-full animate-pulse-neon shadow-[0_0_10px_#10b981]"></div>
          <span class="text-sm font-medium text-emeraldAccent/90 uppercase tracking-widest">Tizim Onlayn</span>
        </div>
      </header>

      <!-- Asosiy Tarkib -->
      <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-8">
        
        <!-- Namlik Kartasi -->
        <div class="glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden group">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-neonBlue/50 to-transparent"></div>
          <h2 class="text-sm font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Namlik Darajasi</h2>
          
          <div class="relative flex items-center justify-center">
            <svg class="w-40 h-40">
              <circle class="text-white/5" stroke-width="10" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/>
              <circle id="humidity-ring" class="text-neonBlue progress-ring__circle" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="440" stroke-linecap="round" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/>
            </svg>
            <div class="absolute flex flex-col items-center">
              <span id="humidity-val" class="text-4xl font-bold text-white tracking-tighter">--%</span>
              <span class="text-[10px] text-neonBlue/60 font-medium uppercase mt-1">Namlik</span>
            </div>
          </div>
        </div>

        <!-- Yorug'lik Kartasi -->
        <div class="glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden group">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sunYellow/50 to-transparent"></div>
          <h2 class="text-sm font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Yorug'lik Darajasi</h2>
          
          <div class="relative flex items-center justify-center">
            <svg class="w-40 h-40">
              <circle class="text-white/5" stroke-width="10" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/>
              <circle id="light-ring" class="text-sunYellow progress-ring__circle" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="440" stroke-linecap="round" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/>
            </svg>
            <div class="absolute flex flex-col items-center">
              <span id="light-val" class="text-4xl font-bold text-white tracking-tighter">--%</span>
              <span class="text-[10px] text-sunYellow/60 font-medium uppercase mt-1">Yorug'lik</span>
            </div>
          </div>
        </div>

        <!-- Harakat Kartasi -->
        <div class="glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden group">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-emeraldAccent/50 to-transparent"></div>
          <h2 class="text-sm font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Harakatni Aniqlash</h2>
          
          <div class="flex flex-col items-center justify-center py-6">
            <div id="motion-icon-container" class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 border border-white/10">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            
            <div id="motion-status-badge" class="px-6 py-2 rounded-full border border-white/10 bg-white/5 text-white/60 font-medium text-sm">
              <span id="motion-status">Kutilmoqda...</span>
            </div>
          </div>
        </div>

      </main>

      <!-- So'nggi Faollik -->
      <footer class="glass p-6 rounded-3xl mt-auto">
        <h3 class="text-xs font-semibold text-white/60 mb-4 uppercase tracking-widest flex items-center gap-2">
          <div class="w-1.5 h-1.5 bg-neonBlue rounded-full"></div>
          So'nggi Faollik
        </h3>
        <div id="activity-log" class="space-y-3 max-h-40 overflow-y-auto text-sm text-white/30">
          <p>Tizim onlayn, ma'lumotlar kutilmoqda...</p>
        </div>
      </footer>

    </div>

    <!-- MUHIM: JS faylingiz manzilini to'g'ri ko'rsating -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
