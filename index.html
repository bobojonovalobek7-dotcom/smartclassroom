<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqlli Sinfxona Monitoring Paneli</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { darkBg: '#0f172a', neonBlue: '#00d2ff', sunYellow: '#fbbf24', emeraldAccent: '#10b981' },
            fontFamily: { sans: ['Outfit', 'sans-serif'] },
          }
        }
      }
    </script>

    <style>
      body { background-color: #0f172a; color: white; font-family: 'Outfit', sans-serif; }
      .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
      .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
      .progress-ring__circle { transition: stroke-dashoffset 0.8s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
  </head>
  <body class="bg-darkBg text-white antialiased p-4 md:p-8">
    <div class="max-w-7xl mx-auto flex flex-col min-h-screen">
      
      <!-- Header -->
      <header class="flex justify-between items-center mb-12 glass p-6 rounded-3xl">
        <h1 class="text-2xl font-semibold text-white/90">Aqlli Sinfxona <span class="text-neonBlue font-light">v1.0</span></h1>
        <div class="flex items-center gap-3 bg-white/5 px-5 py-2 rounded-full border border-white/10">
          <div class="w-2.5 h-2.5 bg-emeraldAccent rounded-full shadow-[0_0_10px_#10b981]"></div>
          <span class="text-sm font-medium text-emeraldAccent/90 uppercase tracking-widest">Tizim Onlayn</span>
        </div>
      </header>

      <!-- Main Content -->
      <main class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
        <!-- Namlik -->
        <div class="glass-card p-8 flex flex-col items-center">
          <h2 class="text-sm font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Namlik Darajasi</h2>
          <div class="relative flex items-center justify-center">
            <svg class="w-40 h-40"><circle class="text-white/5" stroke-width="10" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/><circle id="humidity-ring" class="text-neonBlue progress-ring__circle" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="440" stroke-linecap="round" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/></svg>
            <div class="absolute flex flex-col items-center">
              <span id="humidity-val" class="text-4xl font-bold">--%</span>
              <span class="text-[10px] text-neonBlue/60 uppercase">Namlik</span>
            </div>
          </div>
        </div>

        <!-- Yorug'lik -->
        <div class="glass-card p-8 flex flex-col items-center">
          <h2 class="text-sm font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Yorug'lik Darajasi</h2>
          <div class="relative flex items-center justify-center">
            <svg class="w-40 h-40"><circle class="text-white/5" stroke-width="10" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/><circle id="light-ring" class="text-sunYellow progress-ring__circle" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="440" stroke-linecap="round" stroke="currentColor" fill="transparent" r="70" cx="80" cy="80"/></svg>
            <div class="absolute flex flex-col items-center">
              <span id="light-val" class="text-4xl font-bold">--%</span>
              <span class="text-[10px] text-sunYellow/60 uppercase">Yorug'lik</span>
            </div>
          </div>
        </div>

        <!-- Harakat -->
        <div class="glass-card p-8 flex flex-col items-center">
          <h2 class="text-sm font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Harakatni Aniqlash</h2>
          <div class="py-6 flex flex-col items-center">
            <div id="mot-icon" class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 border border-white/10 text-white/30">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <div id="mot-badge" class="px-6 py-2 rounded-full border border-white/10 bg-white/5 text-white/60 text-sm">
              <span id="motion-status">Kutilmoqda...</span>
            </div>
          </div>
        </div>
      </main>

      <footer class="glass p-6 rounded-3xl mt-auto">
        <h3 class="text-xs font-semibold text-white/60 mb-4 uppercase tracking-widest flex items-center gap-2">So'nggi Faollik</h3>
        <div id="activity-log" class="text-sm text-white/30">Tizim ishga tushirildi...</div>
      </footer>
    </div>

    <!-- FIREBASE LOGIKASI (CDN BILAN) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
      import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA3gctj8nnm6pMMso-owslS_Lb95WVTViE",
        databaseURL: "https://smartclassroom-274df-default-rtdb.firebaseio.com"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      onValue(ref(db, 'sensor'), (snapshot) => {
        const data = snapshot.val();
        if (data) {
          // Namlik
          document.getElementById('humidity-val').innerText = Math.round(data.namlik) + "%";
          document.getElementById('humidity-ring').style.strokeDashoffset = 440 - (440 * data.namlik) / 100;
          
          // Yorug'lik
          document.getElementById('light-val').innerText = Math.round(data.yoruglik) + "%";
          document.getElementById('light-ring').style.strokeDashoffset = 440 - (440 * data.yoruglik) / 100;
          
          // Harakat
          const status = document.getElementById('motion-status');
          const badge = document.getElementById('mot-badge');
          if (data.harakat === 1) {
            status.innerText = "HARAKAT BOR!";
            badge.style.color = "#ef4444";
            badge.style.borderColor = "#ef4444";
          } else {
            status.innerText = "Tinch";
            badge.style.color = "#10b981";
            badge.style.borderColor = "#10b981";
          }
        }
      });
    </script>
  </body>
</html>
