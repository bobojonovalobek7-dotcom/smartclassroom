<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqlli Sinfxona Monitoring Paneli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body class="bg-darkBg text-white antialiased">
    <div id="app" class="min-h-screen flex flex-col p-4 md:p-8 max-w-7xl mx-auto">
      
      <!-- Sarlavha (Header) -->
      <header class="flex flex-col md:flex-row justify-between items-center mb-12 glass p-6 rounded-3xl">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
          <div class="w-10 h-10 bg-neonBlue/20 rounded-xl flex items-center justify-center border border-neonBlue/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-neonBlue" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 10V4" />
            </svg>
          </div>
          <h1 class="text-2xl font-semibold tracking-tight text-white/90">Aqlli Sinfxona <span class="text-neonBlue font-light">v1.0</span></h1>
        </div>
        
        <div class="flex items-center gap-3 bg-white/5 px-5 py-2 rounded-full border border-white/10">
          <div class="w-2.5 h-2.5 bg-emeraldAccent rounded-full animate-pulse-neon shadow-[0_0_10px_#10b981]"></div>
          <span class="text-sm font-medium text-emeraldAccent/90 uppercase tracking-widest">Tizim Onlayn</span>
        </div>
      </header>

      <!-- Asosiy Tarkib -->
      <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-8">
        
        <!-- Namlik Kartasi -->
        <div class="glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden group hover-blue">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-neonBlue/50 to-transparent"></div>
          <h2 class="text-lg font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Namlik Darajasi</h2>
          
          <div class="relative flex items-center justify-center">
            <svg class="w-40 h-40 md:w-48 md:h-48">
              <circle class="text-white/5" stroke-width="12" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96"/>
              <circle id="humidity-ring" class="text-neonBlue progress-ring__circle" stroke-width="12" stroke-dasharray="502.6" stroke-dashoffset="150" stroke-linecap="round" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96"/>
            </svg>
            <div class="absolute flex flex-col items-center">
              <span id="humidity-val" class="text-4xl md:text-5xl font-bold text-white tracking-tighter">--%</span>
              <span class="text-[10px] md:text-xs text-neonBlue/60 font-medium uppercase mt-1 text-center">Optimal Me'yor</span>
            </div>
          </div>
          
          <div class="mt-8 flex justify-between w-full text-xs font-medium text-white/40">
            <span>QURUQ</span>
            <span>NAM</span>
          </div>
        </div>

        <!-- Yorug'lik Kartasi (YANGI) -->
        <div class="glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden group hover-yellow">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sunYellow/50 to-transparent"></div>
          <h2 class="text-lg font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Yorug'lik Darajasi</h2>
          
          <div class="relative flex items-center justify-center">
            <svg class="w-40 h-40 md:w-48 md:h-48">
              <circle class="text-white/5" stroke-width="12" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96"/>
              <circle id="light-ring" class="text-sunYellow progress-ring__circle" stroke-width="12" stroke-dasharray="502.6" stroke-dashoffset="150" stroke-linecap="round" stroke="currentColor" fill="transparent" r="80" cx="96" cy="96"/>
            </svg>
            <div class="absolute flex flex-col items-center">
              <div class="mb-1 text-sunYellow">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
              </div>
              <span id="light-val" class="text-4xl md:text-5xl font-bold text-white tracking-tighter">--%</span>
              <span class="text-[10px] md:text-xs text-sunYellow/60 font-medium uppercase mt-1 text-center">Xona yorug'ligi</span>
            </div>
          </div>
          
          <div class="mt-8 flex justify-between w-full text-xs font-medium text-white/40">
            <span>QORONG'U</span>
            <span>YORUG'</span>
          </div>
        </div>

        <!-- Harakatni Aniqlash Kartasi -->
        <div class="glass-card p-8 flex flex-col items-center justify-center relative overflow-hidden group hover-emerald">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-500/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <h2 class="text-lg font-medium text-white/60 mb-8 uppercase tracking-widest self-start">Harakatni Aniqlash</h2>
          
          <div class="flex flex-col items-center justify-center py-6">
            <div id="motion-icon-container" class="w-20 h-20 md:w-24 md:h-24 bg-white/5 rounded-full flex items-center justify-center mb-6 border border-white/10 transition-all duration-500">
              <svg xmlns="http://www.w3.org/2000/svg" id="motion-icon" class="h-8 w-8 md:h-10 md:w-10 text-white/40 transition-colors duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            
            <div id="motion-status-badge" class="px-6 py-2 rounded-full border border-emeraldAccent/30 bg-emeraldAccent/10 text-emeraldAccent font-semibold text-sm tracking-wide transition-all duration-500">
              <span id="motion-status">Kutilmoqda...</span>
            </div>
          </div>
          
          <p class="text-white/30 text-xs mt-4 text-center">A-12 hududida faollik qidirilmoqda...</p>
        </div>

      </main>

      <!-- So'nggi Faollik Bo'limi -->
      <footer class="glass p-6 rounded-3xl mt-auto">
        <h3 class="text-sm font-semibold text-white/60 mb-4 uppercase tracking-widest flex items-center gap-2">
          <span class="w-1.5 h-1.5 bg-neonBlue rounded-full"></span>
          So'nggi Faollik
        </h3>
        <div id="activity-log" class="space-y-3 max-h-40 overflow-y-auto pr-2">
          <!-- Bu yerda loglar paydo bo'ladi -->
        </div>
      </footer>

    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
